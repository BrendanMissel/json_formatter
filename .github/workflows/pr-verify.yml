name: Vitest CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
        working-directory: ./src

      - name: Install dependencies
        run: npm install
        working-directory: ./src

      - name: Run Linter
        run: npm run lint
        working-directory: ./src

      - name: Run tests
        run: npm run test:run
        working-directory: ./src